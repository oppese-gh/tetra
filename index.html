<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Tetra Tarou Adventure</title>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.js"></script>

<style>
body{
margin:0;
background:#222;
}
</style>

</head>

<body>

<script>

const config = {
type: Phaser.AUTO,
width: 800,
height: 450,
physics:{
default:'arcade',
arcade:{
gravity:{y:1000},
debug:false
}
},
scene:{
preload: preload,
create: create,
update: update
}
};

const game = new Phaser.Game(config);

let player;
let cursors;
let platforms;

function preload(){

this.load.image('ground','https://labs.phaser.io/assets/sprites/platform.png');
this.load.image('tetra','https://labs.phaser.io/assets/sprites/phaser-dude.png');

}

function create(){

platforms = this.physics.add.staticGroup();

platforms.create(400,440,'ground').setScale(2).refreshBody();

player = this.physics.add.sprite(200,200,'tetra');

player.setBounce(0.1);
player.setCollideWorldBounds(true);

this.physics.add.collider(player,platforms);

cursors = this.input.keyboard.createCursorKeys();

this.cameras.main.startFollow(player);

}

function update(){

if(cursors.left.isDown){
player.setVelocityX(-200);
}
else if(cursors.right.isDown){
player.setVelocityX(200);
}
else{
player.setVelocityX(0);
}

if(cursors.up.isDown && player.body.touching.down){
player.setVelocityY(-500);
}

}

</script>

</body>
</html>
